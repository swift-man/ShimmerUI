name: Deploy DocC

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-docc-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-docs:
    runs-on: macos-15

    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Build DocC
        run: |
          ./GeneratingDocumentationSite
          touch ./docs/.nojekyll

      - name: Deploy to swift-man/docs
        # peaceiris/actions-gh-pages@v4.1.0
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453
        with:
          deploy_key: ${{ secrets.DOCS_DEPLOY_KEY }}
          external_repository: swift-man/docs
          publish_branch: main
          publish_dir: ./docs
          destination_dir: ShimmerUI
          keep_files: false
          full_commit_message: Deploy ShimmerUI DocC from ${{ github.repository }}@${{ github.sha }}
