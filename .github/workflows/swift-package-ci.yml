name: Swift Package CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swift-package-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Show Swift Version
        run: swift --version

      - name: Build Package
        run: swift build

      - name: Test Package
        run: swift test

  platform-builds:
    name: Platform Build (${{ matrix.name }})
    runs-on: macos-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS
            destination: generic/platform=iOS
            derived-data: ios
          - name: tvOS
            destination: generic/platform=tvOS
            derived-data: tvos

    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build ${{ matrix.name }}
        run: |
          xcodebuild \
            -scheme ShimmerUI \
            -destination "${{ matrix.destination }}" \
            -derivedDataPath "${{ runner.temp }}/ShimmerUI-${{ matrix.derived-data }}" \
            build \
            CODE_SIGNING_ALLOWED=NO
